interface:
  display_name: "Frontend Project Analysis"
  short_description: "Document-first frontend decomposition"
  default_prompt: "Use $frontend-project-analysis in the target project by preparing a user-owned brief first, then run uv run fpa init --project <key> --name <name> --brief-file <path> or --brief <text>, and decompose this frontend project into Persona, Story Map, Page Map, Features, GWT, and Feature Specs under analysis/."

policy:
  allow_implicit_invocation: true
