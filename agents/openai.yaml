interface:
  display_name: "Frontend Project Analysis"
  short_description: "Document-first frontend decomposition"
  default_prompt: "Use $frontend-project-analysis to install the skill into the target project with uv run fpa install when needed, then run uv run fpa init and decompose this frontend project into Persona, Story Map, Page Map, Features, GWT, and Feature Specs."

policy:
  allow_implicit_invocation: true
